<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helmet Detection - Pi 4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 16px 24px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 1.2rem; color: #58a6ff; }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-badge.ok { background: #238636; color: #fff; }
        .status-badge.error { background: #da3633; color: #fff; }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            width: 100%;
            max-width: 900px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #30363d;
            background: #000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .video-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .stream-placeholder {
            width: 100%;
            height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #161b22;
            color: #8b949e;
        }
        .stream-placeholder .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stats-bar {
            display: flex;
            gap: 24px;
            margin-top: 20px;
            padding: 12px 24px;
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #58a6ff; }
        .stat-label { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background: #238636; color: #fff; }
        .btn-danger { background: #da3633; color: #fff; }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            font-size: 0.85rem;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.helmet { background: #238636; }
        .dot.nohelmet { background: #da3633; }

        footer {
            padding: 16px;
            color: #8b949e;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Helmet Detection System</h1>
        <span id="healthBadge" class="status-badge ok">LIVE</span>
    </header>

    <div class="container">
        <div class="video-wrapper">
            <img id="videoStream" src="{{ url_for('video_feed') }}" alt="Live Stream" />
        </div>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="statFps">--</div>
                <div class="stat-label">FPS</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statDetect">--</div>
                <div class="stat-label">Detect FPS</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statViolations">0</div>
                <div class="stat-label">Violations</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statFrames">0</div>
                <div class="stat-label">Frames</div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="dot helmet"></div> Helmet</div>
            <div class="legend-item"><div class="dot nohelmet"></div> No Helmet</div>
        </div>
    </div>

    <footer>
        Raspberry Pi 4 | YOLOv8 Helmet Detection | Powered by OpenCV
    </footer>

    <script>
        let violationCount = 0;

        function updateHealth() {
            fetch('/health')
                .then(r => r.json())
                .then(d => {
                    document.getElementById('healthBadge').textContent = 'LIVE';
                    document.getElementById('healthBadge').className = 'status-badge ok';
                })
                .catch(() => {
                    document.getElementById('healthBadge').textContent = 'OFFLINE';
                    document.getElementById('healthBadge').className = 'status-badge error';
                });
        }

        setInterval(updateHealth, 5000);

        document.getElementById('videoStream').onerror = function() {
            document.getElementById('healthBadge').textContent = 'STREAM ERROR';
            document.getElementById('healthBadge').className = 'status-badge error';
        };
    </script>
</body>
</html>
